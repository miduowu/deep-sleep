<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DeepSleep - 5分钟深度睡眠冥想</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0D1026 0%, #1A1B3A 50%, #2D1B4E 100%);
      min-height: 100vh;
      color: #EEEAF6;
      overflow-x: hidden;
    }
    .aurora-bg {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; overflow: hidden; z-index: 0;
    }
    .aurora-bg::before {
      content: '';
      position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(123,110,246,0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, rgba(92,224,216,0.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(242,167,224,0.08) 0%, transparent 50%);
      animation: aurora 20s ease-in-out infinite;
    }
    @keyframes aurora {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-5%, 5%) rotate(3deg); }
    }
    .container {
      position: relative; z-index: 1;
      max-width: 500px; margin: 0 auto; padding: 20px;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    /* Home Page */
    .home-page { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px; }
    .home-page.hidden { display: none; }
    .greeting { font-size: 14px; color: #8E8BA3; margin-bottom: 8px; letter-spacing: 2px; }
    .title {
      font-size: 32px; font-weight: 300; margin-bottom: 12px;
      background: linear-gradient(135deg, #EEEAF6 0%, #7B6EF6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { font-size: 16px; color: #8E8BA3; margin-bottom: 40px; }
    .theme-card {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
      padding: 32px 24px; margin-bottom: 32px; width: 100%; max-width: 360px;
    }
    .theme-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: linear-gradient(135deg, rgba(123,110,246,0.3) 0%, rgba(92,224,216,0.3) 100%);
      border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .theme-name { font-size: 22px; font-weight: 500; margin-bottom: 8px; color: #EEEAF6; }
    .theme-desc { font-size: 14px; color: #8E8BA3; line-height: 1.6; }
    .start-btn {
      background: linear-gradient(135deg, #7B6EF6 0%, #5CE0D8 100%);
      border: none; border-radius: 16px; padding: 18px 48px;
      font-size: 18px; font-weight: 500; color: white; cursor: pointer;
      transition: all 0.3s ease; box-shadow: 0 8px 32px rgba(123,110,246,0.3);
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(123,110,246,0.4); }
    .start-btn:active { transform: translateY(0); }
    .start-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .info-cards { display: flex; gap: 12px; margin-top: 24px; width: 100%; max-width: 360px; }
    .info-card {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 16px; text-align: center;
    }
    .info-card-icon { font-size: 20px; margin-bottom: 8px; }
    .info-card-label { font-size: 11px; color: #8E8BA3; margin-bottom: 4px; }
    .info-card-value { font-size: 14px; font-weight: 600; color: #EEEAF6; }
    /* Loading */
    .loading-page { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .loading-page.visible { display: flex; }
    .loading-spinner {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.1); border-top-color: #7B6EF6;
      animation: spin 1s linear infinite; margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: #8E8BA3; margin-bottom: 8px; }
    .loading-sub { font-size: 13px; color: rgba(142,139,163,0.6); }
    /* Player Page */
    .player-page { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .player-page.visible { display: flex; }
    .breath-container { position: relative; width: 260px; height: 260px; margin-bottom: 32px; }
    .breath-ring {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 180px; height: 180px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(123,110,246,0.4) 0%, rgba(92,224,216,0.2) 50%, transparent 70%);
      animation: breathe 8s ease-in-out infinite;
    }
    .breath-ring::before {
      content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
      border-radius: 50%; border: 2px solid rgba(123,110,246,0.3);
      animation: breathe 8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }
    .breath-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 18px; color: rgba(238,234,246,0.8); text-align: center;
      font-weight: 300; letter-spacing: 2px;
    }
    .progress-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .progress-ring circle { fill: none; stroke-width: 3; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; }
    .progress-ring .bg { stroke: rgba(255,255,255,0.06); }
    .progress-ring .progress { stroke: url(#gradient); stroke-dasharray: 816; stroke-dashoffset: 816; transition: stroke-dashoffset 1s linear; }
    .player-info { text-align: center; margin-bottom: 24px; }
    .player-title { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    .player-status { font-size: 14px; color: #8E8BA3; }
    .controls { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; }
    .control-btn {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.08); color: white; font-size: 18px;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .control-btn:hover { background: rgba(255,255,255,0.15); }
    .control-btn.primary {
      width: 68px; height: 68px; font-size: 22px;
      background: linear-gradient(135deg, #7B6EF6 0%, #5CE0D8 100%);
      box-shadow: 0 4px 20px rgba(123,110,246,0.4);
    }
    .back-btn {
      position: absolute; top: 20px; left: 20px;
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.08); color: white; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .text-preview {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 20px; max-width: 360px; width: 100%;
    }
    .text-preview-title { font-size: 12px; color: #8E8BA3; margin-bottom: 12px; letter-spacing: 1px; }
    .text-preview-content {
      font-size: 13px; color: rgba(238,234,246,0.7); line-height: 1.8;
      max-height: 120px; overflow-y: auto;
    }
    .text-preview-content::-webkit-scrollbar { width: 4px; }
    .text-preview-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .voice-select {
      margin-top: 16px; display: flex; align-items: center; gap: 8px; justify-content: center;
    }
    .voice-select label { font-size: 12px; color: #8E8BA3; }
    .voice-select select {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 6px 10px; color: #EEEAF6; font-size: 12px;
      outline: none; cursor: pointer;
    }
    .voice-select select option { background: #1A1B3A; }
    .tips { margin-top: 20px; font-size: 12px; color: rgba(142,139,163,0.6); text-align: center; max-width: 300px; }
  </style>
</head>
<body>
  <div class="aurora-bg"></div>
  <div class="container">
    <!-- Home Page -->
    <div class="home-page" id="homePage">
      <p class="greeting" id="greeting">深夜好</p>
      <h1 class="title">DeepSleep</h1>
      <p class="subtitle">5分钟，进入深度睡眠</p>
      <div class="theme-card">
        <div class="theme-icon" id="themeIcon">🌙</div>
        <h2 class="theme-name" id="themeName">正在加载...</h2>
        <p class="theme-desc" id="themeDesc">根据当前时间与节气，为你生成专属冥想</p>
      </div>
      <button class="start-btn" id="startBtn" onclick="startMeditation()">开始冥想</button>
      <div class="info-cards">
        <div class="info-card">
          <div class="info-card-icon">🌿</div>
          <div class="info-card-label">节气</div>
          <div class="info-card-value" id="infoSolarTerm">—</div>
        </div>
        <div class="info-card">
          <div class="info-card-icon">🕐</div>
          <div class="info-card-label">时段</div>
          <div class="info-card-value" id="infoTimeOfDay">—</div>
        </div>
        <div class="info-card">
          <div class="info-card-icon">💜</div>
          <div class="info-card-label">时长</div>
          <div class="info-card-value">5 分钟</div>
        </div>
      </div>
    </div>
    <!-- Loading Page -->
    <div class="loading-page" id="loadingPage">
      <div class="loading-spinner"></div>
      <p class="loading-text" id="loadingText">正在生成专属冥想引导词...</p>
      <p class="loading-sub">AI 正在为你创作，请稍候</p>
    </div>
    <!-- Player Page -->
    <div class="player-page" id="playerPage">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="breath-container">
        <svg class="progress-ring" viewBox="0 0 280 280">
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#7B6EF6" />
              <stop offset="100%" stop-color="#5CE0D8" />
            </linearGradient>
          </defs>
          <circle class="bg" cx="140" cy="140" r="130" />
          <circle class="progress" id="progressCircle" cx="140" cy="140" r="130" />
        </svg>
        <div class="breath-ring"></div>
        <div class="breath-text" id="breathText">吸气...</div>
      </div>
      <div class="player-info">
        <h2 class="player-title" id="playerTitle">冥想</h2>
        <p class="player-status" id="playerStatus">正在播放...</p>
      </div>
      <div class="controls">
        <button class="control-btn" onclick="goBack()" title="停止">✕</button>
        <button class="control-btn primary" id="playBtn" onclick="togglePlay()">⏸</button>
        <button class="control-btn" onclick="restartSpeech()" title="重新开始">↻</button>
      </div>
      <div class="voice-select">
        <label>语音：</label>
        <select id="voiceSelect" onchange="changeVoice()"></select>
      </div>
      <div class="text-preview">
        <p class="text-preview-title">冥想引导词</p>
        <div class="text-preview-content" id="textPreview">正在生成...</div>
      </div>
    </div>
  </div>
  <script>
    // ==================== 24 Solar Terms ====================
    const SOLAR_TERMS = [
      { name: '立春', month: 2, day: 4, season: '春', theme: '生发启程', imagery: '冰雪消融，万物复苏，嫩芽破土', mood: '希望、新生' },
      { name: '雨水', month: 2, day: 19, season: '春', theme: '润泽滋养', imagery: '春雨绵绵，润物无声', mood: '温润、滋养' },
      { name: '惊蛰', month: 3, day: 6, season: '春', theme: '唤醒觉知', imagery: '春雷惊梦，蛰虫苏醒', mood: '觉醒、活力' },
      { name: '春分', month: 3, day: 21, season: '春', theme: '阴阳平衡', imagery: '昼夜均分，花开半盛', mood: '平衡、和谐' },
      { name: '清明', month: 4, day: 5, season: '春', theme: '清净明澈', imagery: '天清气朗，草木葱茏', mood: '清净、明朗' },
      { name: '谷雨', month: 4, day: 20, season: '春', theme: '生长滋养', imagery: '雨生百谷，牡丹花开', mood: '丰盈、感恩' },
      { name: '立夏', month: 5, day: 6, season: '夏', theme: '盛夏绽放', imagery: '绿意盎然，万物繁茂', mood: '热情、绽放' },
      { name: '小满', month: 5, day: 21, season: '夏', theme: '知足常乐', imagery: '麦穗初齐，小得盈满', mood: '满足、感恩' },
      { name: '芒种', month: 6, day: 6, season: '夏', theme: '播种希望', imagery: '麦浪翻滚，稻秧初插', mood: '耕耘、期待' },
      { name: '夏至', month: 6, day: 21, season: '夏', theme: '极阳生阴', imagery: '日长之至，荷花盛开', mood: '宁静、内观' },
      { name: '小暑', month: 7, day: 7, season: '夏', theme: '清凉自在', imagery: '暑气渐升，心静自凉', mood: '清凉、自在' },
      { name: '大暑', month: 7, day: 23, season: '夏', theme: '热烈沉淀', imagery: '骄阳似火，万物炽盛', mood: '沉淀、内敛' },
      { name: '立秋', month: 8, day: 7, season: '秋', theme: '收敛沉淀', imagery: '秋风初起，梧桐叶落', mood: '收敛、沉淀' },
      { name: '处暑', month: 8, day: 23, season: '秋', theme: '放下释然', imagery: '暑气将尽，云淡风轻', mood: '释然、放下' },
      { name: '白露', month: 9, day: 8, season: '秋', theme: '凝露成珠', imagery: '露凝而白，桂香浮动', mood: '纯净、凝聚' },
      { name: '秋分', month: 9, day: 23, season: '秋', theme: '收获圆满', imagery: '秋果累累，金风送爽', mood: '圆满、收获' },
      { name: '寒露', month: 10, day: 8, season: '秋', theme: '深秋静思', imagery: '枫叶如丹，菊香淡淡', mood: '静思、内省' },
      { name: '霜降', month: 10, day: 23, season: '秋', theme: '归藏蓄能', imagery: '霜叶红于二月花', mood: '归藏、蓄能' },
      { name: '立冬', month: 11, day: 7, season: '冬', theme: '深冬静养', imagery: '万物收藏，水始冰', mood: '静养、收藏' },
      { name: '小雪', month: 11, day: 22, season: '冬', theme: '素雪清心', imagery: '雪花初降，天地素白', mood: '清净、素雅' },
      { name: '大雪', month: 12, day: 7, season: '冬', theme: '冰封静谧', imagery: '大雪纷飞，万籁俱寂', mood: '静谧、安详' },
      { name: '冬至', month: 12, day: 22, season: '冬', theme: '一阳初生', imagery: '日短之至，静待春来', mood: '希望、重生' },
      { name: '小寒', month: 1, day: 6, season: '冬', theme: '寒中取暖', imagery: '天寒地冻，围炉夜话', mood: '温暖、内守' },
      { name: '大寒', month: 1, day: 20, season: '冬', theme: '岁末归根', imagery: '梅花傲雪，静候新春', mood: '归根、期待' },
    ];

    function getCurrentSolarTerm() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      let currentTerm = SOLAR_TERMS[SOLAR_TERMS.length - 1];
      for (let i = 0; i < SOLAR_TERMS.length; i++) {
        const term = SOLAR_TERMS[i];
        const nextTerm = SOLAR_TERMS[(i + 1) % SOLAR_TERMS.length];
        if (term.month === 12 && nextTerm.month === 1) {
          if ((month === 12 && day >= term.day) || (month === 1 && day < nextTerm.day)) { currentTerm = term; break; }
        } else if (term.month === 1 && nextTerm.month === 2) {
          if ((month === 1 && day >= term.day) || (month === 2 && day < nextTerm.day)) { currentTerm = term; break; }
        } else {
          if ((month === term.month && day >= term.day) || (month === nextTerm.month && day < nextTerm.day)) { currentTerm = term; break; }
        }
      }
      return currentTerm;
    }

    function getTimeOfDay() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 12) return '清晨';
      if (hour >= 12 && hour < 18) return '午后';
      if (hour >= 18 && hour < 22) return '傍晚';
      return '深夜';
    }

    function getGreeting() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 12) return '早安';
      if (hour >= 12 && hour < 18) return '午安';
      if (hour >= 18 && hour < 22) return '晚安';
      return '夜深了';
    }

    // ==================== Init ====================
    let currentTerm = getCurrentSolarTerm();
    let timeOfDay = getTimeOfDay();

    function init() {
      const seasonIcons = { '春': '🌸', '夏': '🌿', '秋': '🍂', '冬': '❄️' };
      document.getElementById('greeting').textContent = `${getGreeting()} · ${currentTerm.name}`;
      document.getElementById('themeIcon').textContent = seasonIcons[currentTerm.season] || '🌙';
      document.getElementById('themeName').textContent = `${currentTerm.name}·${currentTerm.theme}`;
      document.getElementById('themeDesc').textContent = `${currentTerm.imagery}。顺应节气，${currentTerm.mood}。`;
      document.getElementById('infoSolarTerm').textContent = currentTerm.name;
      document.getElementById('infoTimeOfDay').textContent = timeOfDay;
      loadVoices();
    }

    // ==================== AI Meditation Text ====================
    async function generateMeditationText() {
      const systemPrompt = `你是一位拥有20年经验的专业冥想引导师，声音低沉温柔，擅长用富有节奏感的语言引导人们进入深度睡眠。

当前节气：${currentTerm.name}（${currentTerm.season}季）
冥想主题：${currentTerm.theme}
自然意象：${currentTerm.imagery}
心境氛围：${currentTerm.mood}
时段：${timeOfDay}

要求：
1. 融入节气自然意象，体现冥想主题和心境
2. 根据时段调整（清晨用轻柔唤醒、午后用深度放松、傍晚用舒缓减压、深夜用助眠入梦）
3. 总字数500-700字，慢速朗读约5分钟
4. 包含：呼吸引导→身体扫描放松→意象引导→深度入眠引导
5. 使用第二人称"你"，句子要短，用省略号表示停顿
6. 绝对不要出现"睁开眼睛""醒来""结束"等唤醒性词汇
7. 结尾自然淡出，不要明确的结束语
8. 直接输出引导词，不要添加标题或说明`;

      // 10秒超时，如果AI API不可用则使用本地文本
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);

      try {
        const response = await fetch('https://text.pollinations.ai/openai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: `请为我生成一段${currentTerm.name}节气的冥想引导词。` }
            ],
            model: 'openai',
            temperature: 0.8
          }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        const data = await response.json();
        if (data.choices && data.choices[0]) {
          return data.choices[0].message.content;
        }
        throw new Error('Invalid response');
      } catch (err) {
        clearTimeout(timeoutId);
        console.warn('AI generation unavailable, using fallback:', err.message);
        return getFallbackText();
      }
    }

    function getFallbackText() {
      return `${currentTerm.name}时节，${currentTerm.imagery}……

现在，找一个舒适的姿势，轻轻闭上眼睛……

让我们从呼吸开始……慢慢地深吸一口气……感受空气流入你的身体……再慢慢地呼出……让所有的紧张都随着呼气消散……

继续深呼吸……每一次呼吸都让你更加放松……每一次呼气都让你更加沉静……

现在，把注意力带到你的头顶……感受头皮慢慢放松……放松你的额头……放松你的眉毛……让所有的思绪都慢慢沉淀下来……

放松你的双眼……放松你的脸颊……放松你的下巴……让面部所有的紧张都消失殆尽……

感受放松从头部向下蔓延……流过你的脖子……流过你的肩膀……带走所有的疲惫和压力……

沿着手臂向下……流过你的胸膛……流过你的腹部……每一次呼吸都让放松更深一层……

流过你的大腿……流过你的小腿……流过你的双脚……整个身体都沉浸在放松之中……

此刻，你躺在一片开阔的高山草甸上……头顶是缓缓流动的极光……${currentTerm.imagery}……

    }

    // ==================== Web Speech API TTS ====================
    let utterance = null;
    let isPlaying = false;
    let isPaused = false;
    let speechStartTime = 0;
    let estimatedDuration = 300000; // 5 min
    let breathInterval = null;
    let progressInterval = null;
    let currentText = '';
    let chineseVoices = [];

    function loadVoices() {
      const load = () => {
        const voices = speechSynthesis.getVoices();
        chineseVoices = voices.filter(v => v.lang.startsWith('zh'));
        const select = document.getElementById('voiceSelect');
        select.innerHTML = '';
        if (chineseVoices.length === 0) {
          const opt = document.createElement('option');
          opt.value = ''; opt.textContent = '默认语音';
          select.appendChild(opt);
        } else {
          chineseVoices.forEach((v, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `${v.name} (${v.lang})`;
            if (v.name.includes('Yunxi') || v.name.includes('Ting') || v.name.includes('Mei') || v.default) opt.selected = true;
            select.appendChild(opt);
          });
        }
      };
      load();
      speechSynthesis.onvoiceschanged = load;
    }

    function speakText(text) {
      if (speechSynthesis.speaking) speechSynthesis.cancel();
      utterance = new SpeechSynthesisUtterance(text);
      const select = document.getElementById('voiceSelect');
      const idx = parseInt(select.value);
      if (chineseVoices[idx]) {
        utterance.voice = chineseVoices[idx];
      }
      utterance.lang = 'zh-CN';
      utterance.rate = 0.65;   // Slow for meditation
      utterance.pitch = 0.85;  // Lower pitch for calmness
      utterance.volume = 0.9;

      utterance.onstart = () => {
        isPlaying = true;
        isPaused = false;
        speechStartTime = Date.now();
        document.getElementById('playBtn').textContent = '⏸';
        document.getElementById('playerStatus').textContent = '正在播放...';
        startBreathAnimation();
        startProgress();
      };
      utterance.onend = () => {
        isPlaying = false;
        isPaused = false;
        document.getElementById('playBtn').textContent = '▶';
        document.getElementById('playerStatus').textContent = '播放完毕';
        stopBreathAnimation();
        stopProgress();
        setProgress(1);
      };
      utterance.onerror = (e) => {
        console.error('Speech error:', e);
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
        document.getElementById('playerStatus').textContent = '播放出错，点击重试';
      };

      // Estimate duration: ~3 chars/sec at rate 0.65
      const charCount = text.replace(/\s/g, '').length;
      estimatedDuration = (charCount / (3 * 0.65)) * 1000;

      speechSynthesis.speak(utterance);
    }

    function togglePlay() {
      if (!utterance) return;
      if (isPlaying && !isPaused) {
        speechSynthesis.pause();
        isPaused = true;
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
        document.getElementById('playerStatus').textContent = '已暂停';
        stopBreathAnimation();
      } else if (isPaused) {
        speechSynthesis.resume();
        isPaused = false;
        isPlaying = true;
        document.getElementById('playBtn').textContent = '⏸';
        document.getElementById('playerStatus').textContent = '正在播放...';
        startBreathAnimation();
      } else {
        // Restart
        speakText(currentText);
      }
    }

    function restartSpeech() {
      if (currentText) speakText(currentText);
    }

    function changeVoice() {
      if (currentText && isPlaying) {
        speakText(currentText);
      }
    }

    // ==================== Animations ====================
    function startBreathAnimation() {
      let isInhale = true;
      const breathText = document.getElementById('breathText');
      breathText.textContent = '吸气...';
      if (breathInterval) clearInterval(breathInterval);
      breathInterval = setInterval(() => {
        isInhale = !isInhale;
        breathText.textContent = isInhale ? '吸气...' : '呼气...';
      }, 4000);
    }

    function stopBreathAnimation() {
      if (breathInterval) { clearInterval(breathInterval); breathInterval = null; }
    }

    function startProgress() {
      if (progressInterval) clearInterval(progressInterval);
      progressInterval = setInterval(() => {
        if (!isPlaying) return;
        const elapsed = Date.now() - speechStartTime;
        const progress = Math.min(elapsed / estimatedDuration, 1);
        setProgress(progress);
      }, 1000);
    }

    function stopProgress() {
      if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
    }

    function setProgress(p) {
      const circle = document.getElementById('progressCircle');
      const circumference = 2 * Math.PI * 130;
      circle.style.strokeDashoffset = circumference * (1 - p);
    }

    // ==================== Page Navigation ====================
    function showPage(pageId) {
      ['homePage', 'loadingPage', 'playerPage'].forEach(id => {
        const el = document.getElementById(id);
        if (id === pageId) {
          el.classList.add(id === 'homePage' ? '' : 'visible');
          if (id !== 'homePage') el.style.display = 'flex';
        } else {
          el.classList.remove(id === 'homePage' ? '' : 'visible');
          if (id !== 'homePage') el.style.display = 'none';
          if (id === 'homePage') el.style.display = '';
        }
      });
    }

    async function startMeditation() {
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      showPage('loadingPage');
      document.getElementById('loadingText').textContent = '正在准备冥想内容...';

      try {
        currentText = await generateMeditationText();
        document.getElementById('loadingText').textContent = '即将开始...';
        document.getElementById('textPreview').textContent = currentText;
        document.getElementById('playerTitle').textContent = `${currentTerm.name}·${currentTerm.theme}`;
        
        // 短暂延迟后切换到播放页并开始语音
        setTimeout(() => {
          showPage('playerPage');
          // 需要用户交互后才能播放语音
          setTimeout(() => speakText(currentText), 100);
        }, 800);
      } catch (err) {
        console.error('Failed:', err);
        // 即使出错也使用本地文本
        currentText = getFallbackText();
        document.getElementById('textPreview').textContent = currentText;
        document.getElementById('playerTitle').textContent = `${currentTerm.name}·${currentTerm.theme}`;
        showPage('playerPage');
        setTimeout(() => speakText(currentText), 100);
      }
      btn.disabled = false;
    }

    function goBack() {
      speechSynthesis.cancel();
      isPlaying = false;
      isPaused = false;
      stopBreathAnimation();
      stopProgress();
      setProgress(0);
      document.getElementById('playBtn').textContent = '▶';
      showPage('homePage');
    }

    // Keep speech alive (Chrome pauses long utterances)
    setInterval(() => {
      if (isPlaying && !isPaused && speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        speechSynthesis.resume();
      }
    }, 10000);

    init();
  </script>
